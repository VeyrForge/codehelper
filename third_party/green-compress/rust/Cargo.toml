[package]
name = "greencompress"
version = "1.0.0"
edition = "2021"
description = "Green Compress — post-training weight compression and CPU layer inference for low-RAM machines"
license-file = "../LICENSE"
readme = "../README.md"
repository = "https://github.com/VeyrForge/GreenCompress"
keywords = [
    "green-compression",
    "quantization",
    "model-compression",
    "int4",
    "int8",
    "inference",
    "simd",
    "transformer",
    "low-memory",
]
categories = ["science", "algorithms", "command-line-utilities"]

[[bin]]
name = "greencompress"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.98"
rand = "0.9.1"
rayon = "1.10.0"
regex = "1.11.1"
serde_json = "1.0.140"
cudarc = { version = "0.19.8", features = ["cublas", "cublaslt", "f16", "driver", "cuda-version-from-build-system"], optional = true }
half = "2"

[features]
default = []
gpu = ["dep:cudarc"]

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2.172"
